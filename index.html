<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>25マス教材メーカー</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #5d6673;
      --line: #c9d2dc;
      --paper: #ffffff;
      --soft: #f5f7f9;
      --accent: #006d77;
      --accent-2: #b5542b;
      --green: #2f7d57;
      --blue: #315c96;
      --focus: #f3c969;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #edf2f4;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .panel {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px;
      background: #fbfcfd;
      border-right: 1px solid var(--line);
    }

    .brand {
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.25;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
      padding: 4px;
      border-radius: 10px;
      background: #e7edf2;
    }

    .mode-tabs button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      color: #3b4651;
      background: transparent;
      cursor: pointer;
      font-weight: 700;
    }

    .mode-tabs button.active {
      color: white;
      background: var(--accent);
    }

    .mode-panel[hidden] {
      display: none;
    }

    .control-group {
      margin: 0 0 18px;
      padding: 0 0 18px;
      border-bottom: 1px solid #e2e8ef;
    }

    .control-group:last-child {
      border-bottom: 0;
    }

    .group-title {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: .95rem;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label,
    .check-row span {
      color: #334155;
      font-size: .88rem;
      font-weight: 600;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid #b8c4d0;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 32px;
      margin-bottom: 8px;
    }

    .check-row input {
      inline-size: 18px;
      block-size: 18px;
      accent-color: var(--accent);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: #dde7ef;
      color: #1f3b4d;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .workspace {
      padding: 28px;
      overflow: auto;
    }

    .toolbar-note {
      max-width: 920px;
      margin: 0 auto 18px;
      color: var(--muted);
      font-size: .9rem;
    }

    .print-stack {
      display: grid;
      gap: 24px;
      justify-items: center;
    }

    .sheet {
      width: min(100%, 920px);
      min-height: 1180px;
      padding: 34px 38px;
      background: var(--paper);
      border: 1px solid #d5dde5;
      box-shadow: 0 20px 50px rgba(31, 41, 51, .12);
      page-break-after: always;
    }

    .sheet.answer {
      border-top: 8px solid var(--accent-2);
    }

    .sheet.english {
      border-top: 8px solid var(--blue);
    }

    .sheet.english.answer {
      border-top-color: var(--green);
    }

    .sheet-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    .sheet-title {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.25;
    }

    .sheet-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .meta {
      display: grid;
      grid-template-columns: 120px 150px;
      gap: 8px;
      font-size: .9rem;
    }

    .meta-line {
      display: flex;
      align-items: end;
      gap: 6px;
      white-space: nowrap;
    }

    .blank {
      display: inline-block;
      min-width: 72px;
      border-bottom: 1.5px solid var(--ink);
      height: 1.5em;
    }

    .problem-info {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 9px;
      border-radius: 999px;
      background: #eef5f5;
      color: #144e54;
      font-size: .82rem;
      font-weight: 700;
    }

    .english .pill {
      background: #edf3ff;
      color: #244b7f;
    }

    .grid-wrap {
      width: 100%;
      overflow: hidden;
      border: 2px solid var(--ink);
      background: #fff;
    }

    table {
      border-collapse: collapse;
      table-layout: fixed;
    }

    table.calc-grid,
    table.english-grid {
      width: 100%;
    }

    .calc-grid th,
    .calc-grid td {
      width: 16.666%;
      height: 112px;
      border: 1.5px solid var(--ink);
      text-align: center;
      vertical-align: middle;
      padding: 8px;
      font-size: 1.12rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .calc-grid th,
    .english-grid th {
      background: #f1f5f8;
    }

    .calc-grid .corner,
    .english-grid .corner {
      background: #dbe7ea;
      color: #2d3d46;
      font-size: .88rem;
    }

    .calc-grid td {
      color: transparent;
    }

    .answer .calc-grid td {
      color: var(--ink);
      background: #fffdf6;
    }

    .english-grid th,
    .english-grid td {
      border: 1.35px solid var(--ink);
      padding: 8px;
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    .english-grid th {
      height: 62px;
      text-align: center;
      font-size: .92rem;
    }

    .english-grid td {
      height: 94px;
      font-size: .9rem;
      background: #fff;
    }

    .answer .english-grid td {
      background: #fbfff8;
    }

    .cell-no {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      margin-bottom: 7px;
      border-radius: 999px;
      background: #e7edf2;
      color: #243443;
      font-size: .78rem;
      font-weight: 700;
    }

    .write-line {
      display: block;
      min-height: 1.55em;
      margin-top: 8px;
      border-bottom: 1.3px solid #5c6773;
    }

    .mission-cue {
      display: block;
      color: #425466;
      font-size: .82rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .mission-prompt {
      display: block;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .choice-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .choice-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 7px;
      border: 1px solid #d6dee7;
      border-radius: 999px;
      background: #f7fafc;
      color: #314253;
      font-size: .78rem;
      font-weight: 700;
    }

    .question-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .question-row {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid #d6dee7;
    }

    .question-body {
      display: grid;
      gap: 8px;
      font-size: .96rem;
    }

    .answer-text {
      color: #1f4f35;
      font-weight: 700;
    }

    .word-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 4px;
      padding: 10px;
      border: 1px solid #cbd7e2;
      background: #f7fafc;
    }

    .bank-word {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      background: white;
      border: 1px solid #d6dee7;
      font-size: .88rem;
      font-weight: 700;
    }

    .sheet-footer {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 18px;
      color: var(--muted);
      font-size: .84rem;
    }

    .mini-list {
      margin: 16px 0 0;
      padding-left: 1.2em;
      color: #3a4652;
      font-size: .9rem;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
        height: auto;
      }

      .workspace {
        padding: 16px;
      }

      .sheet {
        min-height: auto;
        padding: 22px 16px;
      }

      .sheet-head {
        grid-template-columns: 1fr;
      }

      .meta {
        grid-template-columns: 1fr 1fr;
      }

      .calc-grid th,
      .calc-grid td {
        height: 72px;
        padding: 5px;
        font-size: .82rem;
      }

      .english-grid th,
      .english-grid td {
        height: 76px;
        padding: 5px;
        font-size: .78rem;
      }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 10mm;
      }

      body {
        background: #fff;
      }

      .app {
        display: block;
      }

      .panel,
      .toolbar-note {
        display: none;
      }

      .workspace {
        padding: 0;
        overflow: visible;
      }

      .print-stack {
        display: block;
      }

      .sheet {
        width: 100%;
        min-height: 0;
        height: 277mm;
        padding: 0;
        border: 0;
        box-shadow: none;
      }

      .sheet.answer,
      .sheet.english {
        border-top: 0;
      }

      .calc-grid th,
      .calc-grid td {
        height: 29mm;
        border-width: 1.2pt;
        font-size: 15pt;
      }

      .calc-grid .corner {
        font-size: 10pt;
      }

      .english-grid th {
        height: 15mm;
        font-size: 10pt;
      }

      .english-grid td {
        height: 23mm;
        font-size: 10pt;
      }

      .choice-chip {
        min-height: 18px;
        padding: 0 5px;
        font-size: 8pt;
      }

      .question-row {
        padding: 7px 0;
      }

      .sheet-title {
        font-size: 19pt;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="panel" aria-label="教材設定">
      <div class="brand">
        <h1>25マス教材メーカー</h1>
        <p>文字式の反復練習と、中学生向け英語アクティビティをすぐ印刷できます。</p>
      </div>

      <div class="mode-tabs" role="tablist" aria-label="教材タイプ">
        <button id="mathTab" class="active" type="button" role="tab" aria-selected="true">文字式</button>
        <button id="englishTab" type="button" role="tab" aria-selected="false">英語</button>
      </div>

      <section id="mathControls" class="mode-panel">
        <section class="control-group">
          <span class="group-title">プリント</span>
          <div class="field">
            <label for="mathTitle">タイトル</label>
            <input id="mathTitle" type="text" value="25マス文字式計算">
          </div>
          <div class="field">
            <label for="mathActivity">計算タイプ</label>
            <select id="mathActivity">
              <option value="linear-add" selected>文字式の加法</option>
              <option value="equation">一次方程式</option>
              <option value="multiply-divide">文字式の乗除</option>
            </select>
          </div>
          <div class="row-2">
            <div class="field">
              <label for="mathSheets">枚数</label>
              <input id="mathSheets" type="number" min="1" max="6" value="1">
            </div>
            <div class="field">
              <label for="seed">合言葉</label>
              <input id="seed" type="text" value="">
            </div>
          </div>
          <label class="check-row">
            <input id="answers" type="checkbox" checked>
            <span>解答も印刷する</span>
          </label>
        </section>

        <section class="control-group">
          <span class="group-title">式の範囲</span>
          <div class="row-2">
            <div class="field">
              <label for="coefMax">xの係数</label>
              <input id="coefMax" type="number" min="1" max="20" value="9">
            </div>
            <div class="field">
              <label for="constMax">定数</label>
              <input id="constMax" type="number" min="0" max="30" value="9">
            </div>
          </div>
          <div class="field">
            <label for="signMode">符号</label>
            <select id="signMode">
              <option value="positive">正の数だけ</option>
              <option value="mixed" selected>正負を混ぜる</option>
              <option value="negative-heavy">負の数を多めにする</option>
            </select>
          </div>
          <label class="check-row">
            <input id="allowZeroConst" type="checkbox" checked>
            <span>定数が0の式も入れる</span>
          </label>
          <label class="check-row">
            <input id="allowOneCoef" type="checkbox" checked>
            <span>係数1を「x」と表示する</span>
          </label>
        </section>

        <section class="control-group">
          <span class="group-title">表示</span>
          <div class="field">
            <label for="mathSubtitle">補足</label>
            <input id="mathSubtitle" type="text" value="縦の式 + 横の式 を計算しよう">
          </div>
          <label class="check-row">
            <input id="showTips" type="checkbox" checked>
            <span>下に小さなヒントを入れる</span>
          </label>
        </section>
      </section>

      <section id="englishControls" class="mode-panel" hidden>
        <section class="control-group">
          <span class="group-title">英語アクティビティ</span>
          <div class="field">
            <label for="englishTitle">タイトル</label>
            <input id="englishTitle" type="text" value="英語25ミッション">
          </div>
          <div class="row-2">
            <div class="field">
              <label for="englishSheets">枚数</label>
              <input id="englishSheets" type="number" min="1" max="6" value="1">
            </div>
            <div class="field">
              <label for="englishLevel">範囲</label>
              <select id="englishLevel">
                <option value="j1-basic">中1前半</option>
                <option value="j1-full" selected>中1全体</option>
                <option value="j2">中2まで</option>
                <option value="j3">中3まで</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="englishActivity">形式</label>
            <select id="englishActivity">
              <option value="sentence-grid" selected>25ライト英作文</option>
              <option value="transform">書きかえミッション</option>
              <option value="word-phrase">単語・熟語ミッション</option>
            </select>
          </div>
        </section>

        <section class="control-group">
          <span class="group-title">出題</span>
          <div class="field">
            <label for="englishTheme">テーマ</label>
            <select id="englishTheme">
              <option value="daily" selected>日常・学校</option>
              <option value="travel">道案内・旅行</option>
              <option value="culture">日本紹介・行事</option>
              <option value="mixed">ミックス</option>
            </select>
          </div>
          <div class="field">
            <label for="englishSubtitle">補足</label>
            <input id="englishSubtitle" type="text" value="英語で書いて、声に出して確認しよう">
          </div>
          <label class="check-row">
            <input id="englishWordBank" type="checkbox" checked>
            <span>語群を入れる</span>
          </label>
        </section>
      </section>

      <div class="actions">
        <button class="primary" id="generate" type="button">生成</button>
        <button class="secondary" id="print" type="button">印刷</button>
        <button class="secondary wide" id="newSeed" type="button">別の問題にする</button>
      </div>
    </aside>

    <section class="workspace">
      <p class="toolbar-note" id="toolbarNote">左で条件を選び、「生成」で問題を作ります。合言葉を同じにすると、同じ問題をもう一度出せます。</p>
      <div class="print-stack" id="printStack" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const controls = {
      mathTitle: $("mathTitle"),
      mathActivity: $("mathActivity"),
      mathSubtitle: $("mathSubtitle"),
      mathSheets: $("mathSheets"),
      seed: $("seed"),
      answers: $("answers"),
      coefMax: $("coefMax"),
      constMax: $("constMax"),
      signMode: $("signMode"),
      allowZeroConst: $("allowZeroConst"),
      allowOneCoef: $("allowOneCoef"),
      showTips: $("showTips"),
      englishTitle: $("englishTitle"),
      englishSubtitle: $("englishSubtitle"),
      englishSheets: $("englishSheets"),
      englishLevel: $("englishLevel"),
      englishActivity: $("englishActivity"),
      englishTheme: $("englishTheme"),
      englishWordBank: $("englishWordBank"),
    };

    const sentenceMissions = {
      "j1-basic": [
        { cue: "be動詞", prompt: "私は忙しいです。", answer: "I am busy.", choices: ["I", "am", "busy"] },
        { cue: "一般動詞", prompt: "私は英語を勉強します。", answer: "I study English.", choices: ["I", "study", "English"] },
        { cue: "疑問文", prompt: "あなたはテニスをしますか。", answer: "Do you play tennis?", choices: ["Do", "you", "play", "tennis"] },
        { cue: "否定文", prompt: "私はサッカーが好きではありません。", answer: "I do not like soccer.", choices: ["I", "do not", "like", "soccer"] },
        { cue: "can", prompt: "私は泳げます。", answer: "I can swim.", choices: ["I", "can", "swim"] },
        { cue: "命令文", prompt: "本を開きなさい。", answer: "Open your book.", choices: ["Open", "your", "book"] },
        { cue: "疑問詞", prompt: "あなたは何が好きですか。", answer: "What do you like?", choices: ["What", "do", "you", "like"] },
        { cue: "複数形", prompt: "私は2本のペンを持っています。", answer: "I have two pens.", choices: ["I", "have", "two", "pens"] },
      ],
      "j1-full": [
        { cue: "三単現", prompt: "彼は野球をします。", answer: "He plays baseball.", choices: ["He", "plays", "baseball"] },
        { cue: "三単現の疑問文", prompt: "彼女は英語を話しますか。", answer: "Does she speak English?", choices: ["Does", "she", "speak", "English"] },
        { cue: "三単現の否定文", prompt: "ケンは数学が好きではありません。", answer: "Ken does not like math.", choices: ["Ken", "does not", "like", "math"] },
        { cue: "現在進行形", prompt: "ユイは今、料理をしています。", answer: "Yui is cooking now.", choices: ["Yui", "is", "cooking", "now"] },
        { cue: "過去形", prompt: "私は昨日テレビを見ました。", answer: "I watched TV yesterday.", choices: ["I", "watched", "TV", "yesterday"] },
        { cue: "There is", prompt: "机の上に本があります。", answer: "There is a book on the desk.", choices: ["There is", "a book", "on", "the desk"] },
        { cue: "want to", prompt: "私は京都を訪れたいです。", answer: "I want to visit Kyoto.", choices: ["I", "want to", "visit", "Kyoto"] },
        { cue: "疑問詞", prompt: "あなたはどこに住んでいますか。", answer: "Where do you live?", choices: ["Where", "do", "you", "live"] },
      ],
      j2: [
        { cue: "過去進行形", prompt: "私はその時、本を読んでいました。", answer: "I was reading a book then.", choices: ["I", "was", "reading", "a book", "then"] },
        { cue: "未来", prompt: "私たちは明日、京都を訪れるつもりです。", answer: "We will visit Kyoto tomorrow.", choices: ["We", "will", "visit", "Kyoto", "tomorrow"] },
        { cue: "have to", prompt: "私は部屋を掃除しなければなりません。", answer: "I have to clean my room.", choices: ["I", "have to", "clean", "my room"] },
        { cue: "不定詞", prompt: "私は英語を勉強するために図書館へ行きました。", answer: "I went to the library to study English.", choices: ["went", "to the library", "to study", "English"] },
        { cue: "動名詞", prompt: "私は音楽を聞くことを楽しみます。", answer: "I enjoy listening to music.", choices: ["I", "enjoy", "listening to", "music"] },

    function hashText(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function makeRandom(seed) {
      let state = seed || 1;
      return function random() {
        state = Math.imul(state ^ (state >>> 15), 1 | state);
        state ^= state + Math.imul(state ^ (state >>> 7), 61 | state);
        return ((state ^ (state >>> 14)) >>> 0) / 4294967296;
      };
    }

    function intBetween(random, min, max) {
      return Math.floor(random() * (max - min + 1)) + min;
    }

    function pickMany(random, source, count) {
      const pool = [...source];
      const result = [];
      while (result.length < count && pool.length) {
        result.push(pool.splice(intBetween(random, 0, pool.length - 1), 1)[0]);
      }
      return result;
    }

    function signedValue(random, max, mode, allowZero) {
      if (max === 0) return 0;
      const start = allowZero ? 0 : 1;
      let value = intBetween(random, start, max);
      if (value === 0) return 0;
      if (mode === "positive") return value;
      if (mode === "negative-heavy") return random() < 0.65 ? -value : value;
      return random() < 0.5 ? -value : value;
    }

    function makeExpression(random, settings) {
      let a = signedValue(random, settings.coefMax, settings.signMode, false);
      let b = signedValue(random, settings.constMax, settings.signMode, settings.allowZeroConst);
      if (a === 0) a = settings.signMode === "positive" ? 1 : (random() < 0.5 ? -1 : 1);
      return { a, b };
    }

    function formatExpression(expr, settings) {
      const terms = [];
      const a = expr.a;
      const b = expr.b;

      if (a !== 0) {
        if (settings.allowOneCoef && a === 1) terms.push("x");
        else if (settings.allowOneCoef && a === -1) terms.push("-x");
        else terms.push(`${a}x`);
      }

      if (b !== 0 || terms.length === 0) {
        if (terms.length === 0) terms.push(String(b));
        else terms.push(b > 0 ? `+ ${b}` : `- ${Math.abs(b)}`);
      }

      return terms.join(" ");
    }

    function formatLinear(a, b, settings) {
      return formatExpression({ a, b }, settings);
    }

    function formatNumber(value) {
      return value < 0 ? `-${Math.abs(value)}` : String(value);
    }

    function formatEquationPattern(pattern, settings) {
      if (pattern.type === "add") return `x ${pattern.n >= 0 ? "+ " + pattern.n : "- " + Math.abs(pattern.n)}`;
      if (pattern.type === "sub") return `x - ${pattern.n}`;
      if (pattern.type === "mul") return `${pattern.n}x`;
      return formatLinear(pattern.a, pattern.b, settings);
    }

    function solveEquationPattern(pattern, value) {
      if (pattern.type === "add") return value - pattern.n;
      if (pattern.type === "sub") return value + pattern.n;
      if (pattern.type === "mul") return value / pattern.n;
      return (value - pattern.b) / pattern.a;
    }

    function formatTermAnswer(value) {
      if (Number.isInteger(value)) return String(value);
      return value.toFixed(2).replace(/\.?0+$/, "");
    }

    function multiplyExpression(expr, factor) {
      return { a: expr.a * factor, b: expr.b * factor };
    }

    function divideExpression(expr, divisor) {
      return { a: expr.a / divisor, b: expr.b / divisor };
    }

    function makeMathSheet(random, settings) {
      const rows = Array.from({ length: 5 }, () => makeExpression(random, settings));
      const cols = Array.from({ length: 5 }, () => makeExpression(random, settings));
      const answers = rows.map((row) => cols.map((col) => ({
        a: row.a + col.a,
        b: row.b + col.b,
      })));
      return { kind: "linear-add", rows, cols, answers };
    }

    function makeEquationSheet(random, settings) {
      const patterns = [
        { type: "add", n: 2 }, { type: "add", n: -3 }, { type: "sub", n: 4 },
        { type: "sub", n: 7 }, { type: "mul", n: 2 }, { type: "mul", n: 3 },
        { type: "mul", n: -2 }, { type: "mul", n: -3 },
      ];
      const rows = pickMany(random, patterns, 5);
      const rightSides = pickMany(random, [-18, -12, -6, 0, 6, 12, 18, 24, 30], 5);
      const cols = rightSides.map((value) => ({ label: `= ${formatNumber(value)}`, x: value }));
      const answers = rows.map((row) => cols.map((col) => solveEquationPattern(row, col.x)));
      return { kind: "equation", rows, cols, answers };
    }

    function makeMultiplyDivideSheet(random, settings) {
      const rowPool = [
        { op: "×", n: 2 }, { op: "×", n: -3 }, { op: "×", n: 4 },
        { op: "÷", n: 2 }, { op: "÷", n: 3 }, { op: "÷", n: -4 },
      ];
      const rows = pickMany(random, rowPool, 5);
      const exprPool = [
        { a: 6, b: 12 }, { a: -6, b: 18 }, { a: 12, b: -24 },
        { a: -12, b: -12 }, { a: 18, b: 6 }, { a: 24, b: -36 },
        { a: 6, b: 0 }, { a: -18, b: 0 },
      ];
      const cols = pickMany(random, exprPool, 5);
      const answers = rows.map((row) => cols.map((col) => row.op === "×" ? multiplyExpression(col, row.n) : divideExpression(col, row.n)));
      return { kind: "multiply-divide", rows, cols, answers };
    }

            <span class="pill">${settings.signMode === "positive" ? "正の数だけ" : settings.signMode === "negative-heavy" ? "負の数多め" : "正負ミックス"}</span>

    function settingsFromEnglishControls() {
      return {
        title: controls.englishTitle.value.trim() || "英語25ミッション",
        subtitle: controls.englishSubtitle.value.trim(),
        sheets: Math.max(1, Math.min(6, Number(controls.englishSheets.value) || 1)),
        seed: controls.seed.value.trim(),
        includeAnswers: controls.answers.checked,
        level: controls.englishLevel.value,
        activity: controls.englishActivity.value,
        theme: controls.englishTheme.value,
        wordBank: controls.englishWordBank.checked,
      };
    }

    function themeKeys(settings) {
      return settings.theme === "mixed" ? ["daily", "travel", "culture"] : [settings.theme];
    }

    function levelLabel(level) {
      return {
        "j1-basic": "中1前半",
        "j1-full": "中1全体",
        j2: "中2まで",
        j3: "中3まで",
      }[level];
    }

    function activityLabel(activity) {
      return {
        "sentence-grid": "25ライト英作文",
        transform: "書きかえミッション",
        "word-phrase": "単語・熟語ミッション",
      }[activity];
    }

    function getPredicates(settings) {
      return themeKeys(settings).flatMap((key) => englishData.predicates[key][settings.level]);
    }

    function makeSentenceGrid(random, settings) {
      const base = sentenceMissions[settings.level];
      const themed = getPredicates(settings).map((item) => ({
        cue: "語句",
        prompt: item.jp,
        answer: item.phrase,
        choices: item.phrase.split(" "),
      }));
      const pool = [...base, ...themed];
      const missions = [];
      while (missions.length < 25) {
        missions.push(...pickMany(random, pool, Math.min(pool.length, 25 - missions.length)));
      }
      return { missions };
    }

    function sentenceGridHtml(sheet, settings, index, answerMode) {
      const rows = Array.from({ length: 5 }, (_, rowIndex) => `
        <tr>
          ${Array.from({ length: 5 }, (_, colIndex) => {
            const mission = sheet.missions[rowIndex * 5 + colIndex];
            return `<td>
              <span class="cell-no">${rowIndex * 5 + colIndex + 1}</span>
              <span class="mission-cue">${mission.cue}</span>
              <span class="mission-prompt">${mission.prompt}</span>
              ${answerMode ? `<div class="answer-text">${mission.answer}</div>` : `<span class="write-line"></span>`}
              ${!answerMode && settings.wordBank ? `<div class="choice-list">${mission.choices.map((choice) => `<span class="choice-chip">${choice}</span>`).join("")}</div>` : ""}
            </td>`;
          }).join("")}
        </tr>
      `).join("");

      return englishShell(settings, index, answerMode, `
        <div class="problem-info">
          <span class="pill">${levelLabel(settings.level)}</span>
          <span class="pill">1マス1語〜短文</span>
          <span class="pill">文法ミックス</span>
        </div>
        <div class="grid-wrap">
          <table class="english-grid" aria-label="25ライト英作文">
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${answerMode ? "" : `<ol class="mini-list"><li>条件を見て、空欄に英語を書く。語群は必要なら使う。</li><li>全文を書く必要がないマスもあるので、テンポよく進める。</li></ol>`}
      `);
    }

    function makeTransformSheet(random, settings) {
      const source = englishData.transforms[settings.level];
      return { rows: pickMany(random, source, Math.min(12, source.length)) };
    }

    function transformHtml(sheet, settings, index, answerMode) {
      const rows = sheet.rows.map((item, i) => `
        <div class="question-row">
          <span class="cell-no">${i + 1}</span>
          <div class="question-body">
            <strong>${item.base}</strong>
            <span>指示：${item.task}</span>
            ${answerMode ? `<span class="answer-text">${item.answer}</span>` : `<span class="write-line"></span><span class="write-line"></span>`}
          </div>
        </div>
      `).join("");

      return englishShell(settings, index, answerMode, `
        <div class="problem-info">
          <span class="pill">${levelLabel(settings.level)}</span>
          <span class="pill">文法変換</span>
          <span class="pill">1問30秒目安</span>
        </div>
        <div class="question-list">${rows}</div>
        ${answerMode ? "" : `<ol class="mini-list"><li>語順・助動詞・三単現・時制を確認して書きかえる。</li><li>早く終わったら、元の文と書きかえ後の文を音読する。</li></ol>`}
      `);
    }

    function makeWordPhraseSheet(random, settings) {
      const source = themeKeys(settings).flatMap((key) => englishData.words[key]);
      return { rows: pickMany(random, source, 20) };
    }

    function wordPhraseHtml(sheet, settings, index, answerMode) {
      const bank = pickMany(makeRandom(hashText(`${settings.seed}:bank:${index}`)), sheet.rows.map((row) => row[1]), sheet.rows.length);
      const rows = sheet.rows.map((item, i) => `
        <div class="question-row">
          <span class="cell-no">${i + 1}</span>
          <div class="question-body">
            <strong>${item[0]}</strong>
            ${answerMode ? `<span class="answer-text">${item[1]}</span>` : `<span class="write-line"></span>`}
          </div>
        </div>
      `).join("");

      return englishShell(settings, index, answerMode, `
        <div class="problem-info">
          <span class="pill">${levelLabel(settings.level)}</span>
          <span class="pill">単語・熟語</span>
          <span class="pill">20問</span>
        </div>
        ${settings.wordBank && !answerMode ? `<div class="word-bank">${bank.map((word) => `<span class="bank-word">${word}</span>`).join("")}</div>` : ""}
        <div class="question-list">${rows}</div>
        ${answerMode ? "" : `<ol class="mini-list"><li>語群を見てもよい。慣れてきたら語群なしで挑戦する。</li><li>できた単語・熟語を使って、短い英文を1つ作る。</li></ol>`}
      `);
    }

    function englishShell(settings, index, answerMode, body) {
      return `
        <article class="sheet english ${answerMode ? "answer" : ""}">
          <header class="sheet-head">
            <div>
              <h2 class="sheet-title">${settings.title}${answerMode ? " 解答" : ""}</h2>
              <p class="sheet-subtitle">${settings.subtitle || "&nbsp;"}</p>
            </div>
            ${sheetMeta(index, answerMode)}
          </header>
          ${body}
          <footer class="sheet-footer">
            <span>${activityLabel(settings.activity)}</span>
            <span>中学生英語アクティビティ</span>
          </footer>
        </article>
      `;
    }

    function renderMath() {
      const settings = settingsFromMathControls();
      const seedText = settings.seed || String(Date.now());
      if (!settings.seed) controls.seed.value = seedText.slice(-6);
      const random = makeRandom(hashText(`math:${seedText}:${JSON.stringify(settings)}`));
      const makers = {
        "linear-add": makeMathSheet,
        equation: makeEquationSheet,
        "multiply-divide": makeMultiplyDivideSheet,
      };
      const sheets = Array.from({ length: settings.sheets }, () => makers[settings.activity](random, settings));

      $("printStack").innerHTML = sheets.map((sheet, index) => mathSheetHtml(sheet, settings, index, false)).join("")
        + (settings.includeAnswers ? sheets.map((sheet, index) => mathSheetHtml(sheet, settings, index, true)).join("") : "");
      $("toolbarNote").textContent = "左で条件を選び、「生成」で問題を作ります。合言葉を同じにすると、同じ問題をもう一度出せます。";
    }

    function renderEnglish() {
      const settings = settingsFromEnglishControls();
      const seedText = settings.seed || String(Date.now());
      if (!settings.seed) controls.seed.value = seedText.slice(-6);
      const random = makeRandom(hashText(`english:${seedText}:${JSON.stringify(settings)}`));
      const makers = {
        "sentence-grid": makeSentenceGrid,
        transform: makeTransformSheet,
        "word-phrase": makeWordPhraseSheet,
      };
      const renderers = {
        "sentence-grid": sentenceGridHtml,
        transform: transformHtml,
        "word-phrase": wordPhraseHtml,
      };
      const sheets = Array.from({ length: settings.sheets }, () => makers[settings.activity](random, settings));

      $("printStack").innerHTML = sheets.map((sheet, index) => renderers[settings.activity](sheet, settings, index, false)).join("")
        + (settings.includeAnswers ? sheets.map((sheet, index) => renderers[settings.activity](sheet, settings, index, true)).join("") : "");
      $("toolbarNote").textContent = "英語は中学生までの文法・語彙に絞っています。形式と範囲を変えると、授業の時期に合わせて出題できます。";
    }

    function render() {
      if (currentMode === "math") renderMath();
      else renderEnglish();
    }

    function setMode(mode) {
      currentMode = mode;
      $("mathControls").hidden = mode !== "math";
      $("englishControls").hidden = mode !== "english";
      $("mathTab").classList.toggle("active", mode === "math");
      $("englishTab").classList.toggle("active", mode === "english");
      $("mathTab").setAttribute("aria-selected", String(mode === "math"));
      $("englishTab").setAttribute("aria-selected", String(mode === "english"));
      render();
    }

    $("mathTab").addEventListener("click", () => setMode("math"));
    $("englishTab").addEventListener("click", () => setMode("english"));
    $("generate").addEventListener("click", render);
    $("print").addEventListener("click", () => window.print());
    $("newSeed").addEventListener("click", () => {
      controls.seed.value = Math.random().toString(36).slice(2, 8).toUpperCase();
      render();
    });

    Object.values(controls).forEach((control) => {
      control.addEventListener("change", render);
    });

    controls.seed.value = Math.random().toString(36).slice(2, 8).toUpperCase();
    render();
  </script>
</body>
</html>
